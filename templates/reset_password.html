<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restablecer contraseña – DocYa Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    /* 🌈 Fondo DocYa */
    body {
      margin: 0;
      padding: 0;
      font-family: 'Manrope', sans-serif;
      color: white;
      background: linear-gradient(180deg, #0F2027, #203A43, #2C5364);
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* ✨ Header translúcido */
    .header {
      position: absolute;
      top: 0;
      width: 100%;
      background: rgba(255,255,255,0.05);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      text-align: center;
      padding: 14px 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
      z-index: 2;
    }

    .header img {
      width: 150px;
      filter: drop-shadow(0 0 12px rgba(20,184,166,0.5));
    }

    /* 🪟 Contenedor principal glass */
    .glass {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(14px);
      padding: 40px 30px;
      width: 90%;
      max-width: 420px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.25);
      text-align: center;
      animation: fadeIn 1s ease-in-out;
    }

    h2 {
      font-size: 22px;
      margin-top: 10px;
      color: #14B8A6;
    }

    p {
      color: rgba(255,255,255,0.85);
      font-size: 15px;
      margin-bottom: 25px;
      line-height: 1.5;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      margin-bottom: 16px;
      background: rgba(255,255,255,0.15);
      color: white;
      font-size: 15px;
      outline: none;
      transition: 0.3s;
    }

    input:focus {
      background: rgba(255,255,255,0.22);
      box-shadow: 0 0 6px #14B8A6;
    }

    input::placeholder {
      color: rgba(255,255,255,0.6);
    }

    /* 🟢 Botón DocYa */
    button {
      width: 100%;
      background: linear-gradient(90deg, #14B8A6, #0F2027);
      color: white;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      padding: 13px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 4px 10px rgba(20, 184, 166, 0.3);
      position: relative;
      overflow: hidden;
    }

    button:hover {
      transform: scale(1.02);
      box-shadow: 0 6px 16px rgba(20, 184, 166, 0.45);
    }

    /* 🔄 Spinner */
    .spinner {
      display: inline-block;
      width: 22px;
      height: 22px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .msg {
      margin-top: 20px;
      font-size: 14px;
      min-height: 20px;
    }

    footer {
      position: fixed;
      bottom: 10px;
      width: 100%;
      text-align: center;
      font-size: 12px;
      color: rgba(255,255,255,0.55);
      letter-spacing: 0.3px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="header">
    <img src="https://res.cloudinary.com/dqsacd9ez/image/upload/v1757197807/docyapro_1_uxxdjx.png" alt="DocYa Pro">
  </div>

  <div class="glass">
    <h2>Restablecer tu contraseña</h2>
    <p>Ingresá tu nueva contraseña para tu cuenta de <b>DocYa Pro</b>.</p>

    <input type="password" id="password" placeholder="Nueva contraseña">
    <input type="password" id="confirm" placeholder="Confirmar contraseña">

    <button id="submitBtn" onclick="resetPassword()">
      <span id="btnText">Actualizar contraseña</span>
    </button>

    <div class="msg" id="msg"></div>
  </div>

  <footer>© 2025 DocYa · Profesionales a domicilio con confianza</footer>

  <script>
    async function resetPassword() {
      const msg = document.getElementById('msg');
      const password = document.getElementById('password').value.trim();
      const confirm = document.getElementById('confirm').value.trim();
      const token = "{{ token }}";
      const btn = document.getElementById('submitBtn');
      const btnText = document.getElementById('btnText');

      msg.textContent = "";
      msg.style.color = "#f8fafc";

      if (!token) {
        msg.textContent = "⚠️ Token inválido o vencido.";
        msg.style.color = "#f87171";
        return;
      }

      if (password.length < 6) {
        msg.textContent = "La contraseña debe tener al menos 6 caracteres.";
        msg.style.color = "#facc15";
        return;
      }

      if (password !== confirm) {
        msg.textContent = "Las contraseñas no coinciden.";
        msg.style.color = "#f87171";
        return;
      }

      // 🌀 Activar animación de carga
      btn.disabled = true;
      btnText.innerHTML = '<span class="spinner"></span>Actualizando...';

      try {
        const res = await fetch("https://docya-railway-production.up.railway.app/auth/reset_password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token: token, new_password: password }),
        });

        const data = await res.json();
        if (res.ok && data.ok) {
          msg.textContent = "✅ Contraseña actualizada correctamente. Redirigiendo...";
          msg.style.color = "#4ade80";
          setTimeout(() => window.location.href = "https://docya.com.ar/login", 2500);
        } else {
          msg.textContent = "⚠️ " + (data.detail || "Error al actualizar la contraseña.");
          msg.style.color = "#f87171";
          btn.disabled = false;
          btnText.textContent = "Actualizar contraseña";
        }
      } catch (err) {
        msg.textContent = "❌ Error de conexión con el servidor.";
        msg.style.color = "#f87171";
        btn.disabled = false;
        btnText.textContent = "Actualizar contraseña";
      }
    }
  </script>
</body>
</html>
