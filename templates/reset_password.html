<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restablecer contraseña – DocYa Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Manrope', sans-serif;
      color: white;
      background: linear-gradient(180deg, #0F2027, #203A43, #2C5364);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .glass {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(12px);
      padding: 40px;
      width: 90%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.25);
    }

    img {
      width: 160px;
      margin-bottom: 20px;
    }

    h2 {
      font-size: 22px;
      margin-bottom: 12px;
      color: #14B8A6;
    }

    p {
      font-size: 15px;
      color: #e0e0e0;
      margin-bottom: 25px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      margin-bottom: 15px;
      background: rgba(255,255,255,0.12);
      color: white;
      font-size: 15px;
      outline: none;
    }

    input::placeholder {
      color: rgba(255,255,255,0.7);
    }

    button {
      width: 100%;
      background: linear-gradient(90deg, #14B8A6, #0F2027);
      color: white;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      opacity: 0.9;
    }

    .msg {
      margin-top: 18px;
      font-size: 14px;
    }

    footer {
      position: fixed;
      bottom: 10px;
      width: 100%;
      text-align: center;
      font-size: 12px;
      color: rgba(255,255,255,0.6);
    }
  </style>
</head>
<body>

  <div class="glass">
    <img src="https://res.cloudinary.com/dqsacd9ez/image/upload/v1757197807/docyapro_1_uxxdjx.png" alt="DocYa Pro" />
    <h2>Restablecer contraseña</h2>
    <p>Ingresá tu nueva contraseña para tu cuenta de <b>DocYa Pro</b>.</p>

    <input type="password" id="password" placeholder="Nueva contraseña" />
    <input type="password" id="confirm" placeholder="Confirmar contraseña" />
    <button onclick="resetPassword()">Actualizar contraseña</button>
    <div class="msg" id="msg"></div>
  </div>

  <footer>© 2025 DocYa · Profesionales a domicilio</footer>

  <script>
    async function resetPassword() {
      const msg = document.getElementById('msg');
      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');
      const password = document.getElementById('password').value.trim();
      const confirm = document.getElementById('confirm').value.trim();

      if (!token) {
        msg.textContent = "⚠️ Token inválido o vencido.";
        msg.style.color = "#f87171";
        return;
      }

      if (!password || password.length < 6) {
        msg.textContent = "La contraseña debe tener al menos 6 caracteres.";
        msg.style.color = "#facc15";
        return;
      }

      if (password !== confirm) {
        msg.textContent = "Las contraseñas no coinciden.";
        msg.style.color = "#f87171";
        return;
      }

      try {
        const res = await fetch("https://docya-railway-production.up.railway.app/auth/reset_password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token: token, new_password: password }),
        });

        const data = await res.json();
        if (res.ok && data.ok) {
          msg.textContent = "✅ Contraseña actualizada correctamente. Ya podés iniciar sesión.";
          msg.style.color = "#4ade80";
          setTimeout(() => (window.location.href = "https://docya.com.ar/login"), 2500);
        } else {
          msg.textContent = "⚠️ " + (data.detail || "Error al actualizar la contraseña.");
          msg.style.color = "#f87171";
        }
      } catch (err) {
        msg.textContent = "❌ Error de conexión.";
        msg.style.color = "#f87171";
      }
    }
  </script>

</body>
</html>
