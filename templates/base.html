<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}DocYa{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="font-sans bg-gray-50 text-gray-800">

  <!-- Navbar -->
  <header class="bg-white shadow sticky top-0 z-50">
    <div class="container mx-auto flex items-center justify-between px-6 py-4">
      <a href="/" class="flex items-center space-x-2">
        <img src="https://res.cloudinary.com/dqsacd9ez/image/upload/v1757197807/logo_1_svfdye.png" alt="DocYa Logo" class="h-8">
        <span class="font-bold text-xl text-blue-600">DocYa</span>
      </a>
      <nav class="space-x-6">
        <a href="/pacientes" class="hover:text-blue-600">Pacientes</a>
        <a href="/medicos" class="hover:text-blue-600">Médicos</a>
        <a href="#contacto" class="hover:text-blue-600">Contacto</a>
      </nav>
    </div>
  </header>

  <!-- Main -->
  <main>
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer class="bg-gray-900 text-gray-300 text-center py-6 mt-12">
    <p class="text-sm">© 2025 DocYa. Todos los derechos reservados.</p>
    <p class="text-xs mt-2 opacity-70">DocYa no reemplaza emergencias. Ante una urgencia, llama al 911.</p>
  </footer>

</body>
</html>
