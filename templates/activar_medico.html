<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Cuenta activada - DocYa</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-green-50 to-emerald-100 flex items-center justify-center min-h-screen font-sans">

  <div class="bg-white p-10 rounded-3xl shadow-2xl text-center max-w-lg animate-fadeIn">
    <!-- Logo -->
    <img src="https://res.cloudinary.com/dqsacd9ez/image/upload/v1757197807/docyapro_1_uxxdjx.png"
         alt="DocYa" class="mx-auto w-44 mb-8 drop-shadow-md">

    <!-- Título -->
    <h1 class="text-3xl font-extrabold text-emerald-600 mb-4">
      🎉 ¡Cuenta activada con éxito!
    </h1>

    <!-- Mensaje principal -->
    <p class="text-gray-700 text-lg leading-relaxed mb-6">
      Bienvenido al equipo <span class="font-semibold text-emerald-700">DocYa</span>.  
      Gracias por unirte a nuestra red de profesionales de la salud.  
      Tu cuenta ya está lista para comenzar a recibir consultas.
    </p>

    <!-- Nota secundaria -->
    <p class="mt-6 text-sm text-gray-500">
      Si necesitas ayuda, podés contactarnos en  
      <a href="mailto:soporte@docya.com.ar" class="text-emerald-600 hover:underline">soporte@docya.com.ar</a>
    </p>
  </div>

  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fadeIn {
      animation: fadeIn 0.8s ease-in-out;
    }
  </style>

</body>
</html>
